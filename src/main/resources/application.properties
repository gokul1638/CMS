spring.application.name=cloud-management-system
server.port=8081

# MySQL datasource configuration
spring.datasource.url=${DB_URL:jdbc:mysql://3.80.215.129:3306/CMS_cloud?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:gokul}
