spring.application.name=cloud-management-system
server.port=8081

# H2 Database (for testing/development)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable SQL script initialization (we're using DataLoader instead)
spring.sql.init.mode=never

# H2 Console enabled for testing
spring.h2.console.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.cms.cloudmanagement=DEBUG

